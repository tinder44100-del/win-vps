name: Tailscale Windows Connect

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  connect:
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Connect Tailscale باستخدام Action الرسمي
      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: "a06-de-monam.tailabd540.ts.net"

      # 3️⃣ التحقق من الاتصال بالجهاز داخل Tailnet
      - name: Verify Tailscale Connection
        run: |
          echo "Checking connection to Tailnet host..."
          tailscale status
          tailscale ping a06-de-monam.tailabd540.ts.net

      # 4️⃣ إنشاء مستخدم RDP بصلاحيات المسؤول (اختياري)
      - name: Enable RDP
        run: |
          net user runneradmin Pass123! /add
          net localgroup administrators runneradmin /add
          echo "✅ RDP user created"

      # 5️⃣ تنفيذ أوامر على الجهاز داخل Tailnet
      - name: Run commands on Tailnet host
        run: |
          echo "✅ Connected successfully to a06-de-monam.tailabd540.ts.net"
