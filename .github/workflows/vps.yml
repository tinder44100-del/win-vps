name: windows-vps

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ تثبيت Tailscale عبر Chocolatey
      - name: Install Tailscale
        run: |
          choco install tailscale -y
          refreshenv  # تحديث PATH داخل الخطوة نفسها

      # 2️⃣ تشغيل Tailscale مع AuthKey
      - name: Start Tailscale
        run: |
          $authKey = "kk3h6m4U6G11CNTRL-C5Vk4VYx6FY65N9D7owtEYVtCeAzaYCwV"
          $hostname = "github-vps"
          Write-Host "Starting Tailscale..."
          tailscale up --authkey $authKey --hostname $hostname

      # 3️⃣ التحقق من اتصال Tailscale
      - name: Verify Tailscale Connection
        run: |
          $status = tailscale status
          if ($status -match "100\..*") {
              Write-Host "✅ Tailscale is connected successfully."
          } else {
              Write-Error "❌ Tailscale connection failed! Exiting workflow."
              exit 1
          }

      # 4️⃣ إنشاء مستخدم RDP بصلاحيات المسؤول
      - name: Enable RDP
        run: |
          net user runneradmin Pass123! /add
          net localgroup administrators runneradmin /add
          Write-Host "✅ RDP user created."

      # 5️⃣ حلقة لضمان الاتصال المستمر
      - name: Keep Tailscale Connected
        run: |
          $authKey = "kk3h6m4U6G11CNTRL-C5Vk4VYx6FY65N9D7owtEYVtCeAzaYCwV"
          $hostname = "github-vps"
          Write-Host "Starting continuous Tailscale monitoring..."
          while ($true) {
              try {
                  $status = tailscale status
                  if ($status -match "100\..*") {
                      Write-Host "$(Get-Date -Format G) - ✅ Tailscale connected."
                  } else {
                      Write-Host "$(Get-Date -Format G) - ⚠️ Tailscale disconnected. Reconnecting..."
                      tailscale up --authkey $authKey --hostname $hostname
                  }
              } catch {
                  Write-Host "$(Get-Date -Format G) - ❌ Error checking Tailscale status. Retrying..."
              }
              Start-Sleep -Seconds 30
          }
