name: Tailscale Connect Workflow

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  connect:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Connect Tailscale باستخدام Action الرسمي
      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          ping: "a06-de-monam.tailabd540.ts.net"   # الجهاز المستهدف داخل Tailnet

      # 3️⃣ التحقق من الاتصال بالجهاز
      - name: Verify Tailscale Connection
        run: |
          echo "Checking connection to Tailnet host..."
          tailscale status
          tailscale ping a06-de-monam.tailabd540.ts.net

      # 4️⃣ تنفيذ أوامر على الجهاز داخل Tailnet
      - name: Run commands on Tailnet host
        run: |
          echo "✅ Connected successfully to a06-de-monam.tailabd540.ts.net"
          # هنا يمكنك إضافة أي أوامر تريد تنفيذها على VPS
          # مثال: curl, ssh, أو أي script
